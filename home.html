<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ССБА — Официальный сайт</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANXc2iamJlauk-xsFYiITOBYBh1sUCKqU",
            authDomain: "ssba-58900.firebaseapp.com",
            databaseURL: "https://ssba-58900-default-rtdb.firebaseio.com",
            projectId: "ssba-58900",
            storageBucket: "ssba-58900.firebasestorage.app",
            messagingSenderId: "615638249829",
            appId: "1:615638249829:web:a68cd961fa79ebc7ef718c",
            measurementId: "G-ZY8PQ2DXE3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция парсинга текста и расстановки изображений в нужные места
        window.parseTextWithImages = function(text, mediaUrls, fallbackUrl) {
            let urls = mediaUrls && mediaUrls.length > 0 ? [...mediaUrls] : (fallbackUrl ? [fallbackUrl] : []);
            let htmlText = text || "";

            // Заменяем все [img1], [img2] и т.д. на реальные теги картинок
            let usedIndexes = new Set();
            htmlText = htmlText.replace(/\[img(\d+)\]/g, (match, num) => {
                const idx = parseInt(num) - 1;
                if (urls[idx]) {
                    usedIndexes.add(idx);
                    return `<img src="${urls[idx]}" class="inline-post-img" alt="Фото">`;
                }
                return ""; // Если такого индекса нет, убираем код
            });

            // Если какие-то фото загружены, но коды не написаны в тексте, кидаем их наверх
            let topImagesHtml = "";
            urls.forEach((url, idx) => {
                if (!usedIndexes.has(idx) && text && !text.includes(`[img${idx+1}]`)) {
                    topImagesHtml += `<img src="${url}" class="inline-post-img" style="margin-bottom:15px;" alt="Фото">`;
                }
            });

            return topImagesHtml + `<p class="word-text">${htmlText}</p>`;
        };

        function loadSectionData(collectionName, containerId, renderFunction) {
            const container = document.getElementById(containerId);
            const q = query(collection(db, collectionName), orderBy("createdAt", "desc"));

            onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    container.innerHTML = `<div class="card"><p style="text-align:center; color:#666;">Пока ничего нет.</p></div>`;
                    return;
                }
                container.innerHTML = ""; 
                snapshot.forEach((doc) => {
                    container.innerHTML += renderFunction(doc.data());
                });
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            // 1. Посты
            loadSectionData("posts", "posts-container", (data) => `
                <div class="card">
                    <h3>${data.title || "[Без заголовка]"}</h3>
                    <div class="scroll-content">
                        ${parseTextWithImages(data.text, data.mediaUrls, data.mediaUrl)}
                    </div>
                </div>
            `);

            // 2. Фотогалерея
            loadSectionData("photo", "photo-container", (data) => `
                <div class="card">
                    <h3>${data.title}</h3>
                    <div class="scroll-content">
                        ${parseTextWithImages(data.text, data.mediaUrls, data.mediaUrl)}
                    </div>
                </div>
            `);

            // 3. Видеоархив
            loadSectionData("video", "video-container", (data) => `
                <div class="card">
                    <h3>${data.title}</h3>
                    <div class="scroll-content">
                        <video src="${data.mediaUrls ? data.mediaUrls[0] : data.mediaUrl}" controls class="loaded-video-audio"></video>
                        <p class="word-text">${data.text || ""}</p>
                    </div>
                </div>
            `);

            // 4. Музыка
            loadSectionData("music", "music-container", (data) => `
                <div class="card">
                    <h3>${data.title}</h3>
                    <div class="scroll-content">
                        <audio src="${data.mediaUrls ? data.mediaUrls[0] : data.mediaUrl}" controls style="width:100%; margin-bottom:10px;"></audio>
                        <p class="word-text">${data.text || ""}</p>
                    </div>
                </div>
            `);

            // 5. Библиотека
            loadSectionData("books", "books-container", (data) => `
                <div class="card">
                    <h3>${data.title}</h3>
                    <div class="scroll-content">
                        <p class="word-text" style="margin-bottom: 15px;">${data.text}</p>
                        <a href="${data.mediaUrls ? data.mediaUrls[0] : data.mediaUrl}" target="_blank" class="btn">Скачать / Читать</a>
                    </div>
                </div>
            `);
        });
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #121214; color: #ffffff; font-family: 'Arial', sans-serif; line-height: 1.5; }

        header { background-color: #121214; padding: 40px 20px 20px 20px; text-align: center; }
        .logo h1 { font-family: 'Montserrat', sans-serif; font-size: 4.2rem; font-weight: 900; color: #EBEBEB; text-transform: uppercase; text-shadow: 4px 4px 0px #dd0000; }
        .description { font-size: 1.05rem; font-weight: bold; color: #a0a0a5; text-align: center; margin-bottom: 35px; }

        nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; max-width: 650px; margin: 0 auto 20px auto; }
        nav a { color: #ffffff; text-decoration: none; font-size: 0.95rem; text-transform: uppercase; padding: 15px 0; background-color: #1a1a1c; border: 1px solid #2d2d30; text-align: center; }
        nav a:hover { background-color: #dd0000; color: #000000; font-weight: bold; }
        .red-bar { width: 100%; height: 5px; background-color: #dd0000; }

        .main-content-wrapper { background-color: #0f0f11; position: relative; padding: 50px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .section-title { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; text-transform: uppercase; border-left: 6px solid #dd0000; padding-left: 15px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }

        /* ВМЕСТИТЕЛЬНАЯ КАРТОЧКА С СКРОЛЛОМ */
        .card { 
            background: rgba(26, 26, 28, 0.92); 
            border: 1px solid #2d2d30; 
            padding: 25px; 
            max-height: 460px; /* Текст не растянет пост на всю страницу */
            display: flex; 
            flex-direction: column; 
        }
        .card h3 { font-family: 'Montserrat', sans-serif; font-size: 1.3rem; text-transform: uppercase; margin-bottom: 15px; color: #dd0000; flex-shrink: 0; }
        
        /* Внутренний скролл для контента */
        .scroll-content { 
            overflow-y: auto; 
            flex-grow: 1; 
            padding-right: 8px;
        }

        /* Кастомизация полосы прокрутки, чтобы выглядело аккуратно */
        .scroll-content::-webkit-scrollbar { width: 6px; }
        .scroll-content::-webkit-scrollbar-track { background: #121214; }
        .scroll-content::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .scroll-content::-webkit-scrollbar-thumb:hover { background: #dd0000; }

        /* ШРИФТ ВОРДА */
        .card p.word-text { 
            font-family: 'Times New Roman', Times, Georgia, serif; 
            font-size: 1.15rem; 
            color: #e0e0e0; 
            white-space: pre-wrap; 
            line-height: 1.6;
        }

        /* СТИЛИ ИЗОБРАЖЕНИЙ ВНУТРИ ТЕКСТА */
        .inline-post-img { 
            width: 100%; 
            max-height: 280px; 
            object-fit: contain; 
            background-color: #121214; 
            border: 1px solid #2d2d30; 
            margin: 12px 0;
            display: block;
        }

        .loaded-video-audio { width: 100%; max-height: 240px; background-color: #121214; margin-bottom: 10px; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #dd0000; color: #000000; text-decoration: none; font-weight: bold; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1>ССБА</h1></div>
        <p class="description">Марксистское объединение. Образование и просвещение.</p>
        <nav>
            <a href="#posts">Посты</a>
            <a href="#photo">Фото</a>
            <a href="#video">Видео</a>
            <a href="#music">Музыка</a>
            <a href="#books">Книги</a>
        </nav>
    </header>
    <div class="red-bar"></div>

    <div class="main-content-wrapper">
        <div class="container">
            <section id="posts"><h2 class="section-title">Последние Посты</h2><div class="grid" id="posts-container"></div></section>
            <section id="photo"><h2 class="section-title">Фотогалерея</h2><div class="grid" id="photo-container"></div></section>
            <section id="video"><h2 class="section-title">Видеоархив</h2><div class="grid" id="video-container"></div></section>
            <section id="music"><h2 class="section-title">Музыкальный архив</h2><div class="grid" id="music-container"></div></section>
            <section id="books"><h2 class="section-title">Библиотека</h2><div class="grid" id="books-container"></div></section>
        </div>
    </div>
</body>
</html>
