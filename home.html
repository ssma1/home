<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ССБА — Официальный сайт</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <!-- Подключение Firebase и логики карусели -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANXc2iamJlauk-xsFYiITOBYBh1sUCKqU",
            authDomain: "ssba-58900.firebaseapp.com",
            databaseURL: "https://ssba-58900-default-rtdb.firebaseio.com",
            projectId: "ssba-58900",
            storageBucket: "ssba-58900.firebasestorage.app",
            messagingSenderId: "615638249829",
            appId: "1:615638249829:web:a68cd961fa79ebc7ef718c",
            measurementId: "G-ZY8PQ2DXE3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция рендеринга карусели изображений (ТТ-стиль)
        window.renderMediaBlock = function(mediaUrls, fallbackUrl) {
            const urls = mediaUrls && mediaUrls.length > 0 ? mediaUrls : (fallbackUrl ? [fallbackUrl] : []);
            if (urls.length === 0) return "";
            if (urls.length === 1) {
                return `<img src="${urls[0]}" class="loaded-media" alt="Медиа">`;
            }
            
            // Если картинок несколько, собираем слайдер
            const slides = urls.map((url, i) => `<img src="${url}" class="carousel-slide ${i === 0 ? 'active' : ''}" alt="Слайд">`).join('');
            const dots = urls.map((_, i) => `<span class="carousel-dot ${i === 0 ? 'active' : ''}" onclick="window.setSlide(this, ${i})"></span>`).join('');
            
            return `
                <div class="carousel-container">
                    <div class="carousel-slides">${slides}</div>
                    <button type="button" class="carousel-nav prev" onclick="window.changeSlide(this, -1)">&#10094;</button>
                    <button type="button" class="carousel-nav next" onclick="window.changeSlide(this, 1)">&#10095;</button>
                    <div class="carousel-dots">${dots}</div>
                </div>
            `;
        };

        // Функции управления слайдером
        window.changeSlide = function(btn, dir) {
            const container = btn.parentElement;
            const slides = container.querySelectorAll('.carousel-slide');
            const dots = container.querySelectorAll('.carousel-dot');
            let idx = Array.from(slides).findIndex(s => s.classList.contains('active'));
            
            slides[idx].classList.remove('active');
            dots[idx].classList.remove('active');
            
            idx += dir;
            if (idx >= slides.length) idx = 0;
            if (idx < 0) idx = slides.length - 1;
            
            slides[idx].classList.add('active');
            dots[idx].classList.add('active');
        };

        window.setSlide = function(dot, targetIdx) {
            const container = dot.parentElement.parentElement;
            const slides = container.querySelectorAll('.carousel-slide');
            const dots = container.querySelectorAll('.carousel-dot');
            
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            
            slides[targetIdx].classList.add('active');
            dots[targetIdx].classList.add('active');
        };

        function loadSectionData(collectionName, containerId, renderFunction) {
            const container = document.getElementById(containerId);
            const q = query(collection(db, collectionName), orderBy("createdAt", "desc"));

            onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    container.innerHTML = `<div class="card"><p style="text-align:center; color:#666;">Пока ничего нет.</p></div>`;
                    return;
                }
                container.innerHTML = ""; 
                snapshot.forEach((doc) => {
                    container.innerHTML += renderFunction(doc.data());
                });
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            // 1. Посты (Фото на самом верху карточки)
            loadSectionData("posts", "posts-container", (data) => `
                <div class="card text-post-card">
                    ${renderMediaBlock(data.mediaUrls, data.mediaUrl)}
                    <h3>${data.title || "[Без заголовка]"}</h3>
                    <p class="word-text">${data.text}</p>
                </div>
            `);

            // 2. Фотогалерея (Фото на самом верху карточки)
            loadSectionData("photo", "photo-container", (data) => `
                <div class="card media-card">
                    ${renderMediaBlock(data.mediaUrls, data.mediaUrl)}
                    <h3>${data.title}</h3>
                    <p class="word-text">${data.text}</p>
                </div>
            `);

            // 3. Видеоархив (Плеер на самом верху карточки)
            loadSectionData("video", "video-container", (data) => `
                <div class="card media-card">
                    <video src="${data.mediaUrls ? data.mediaUrls[0] : data.mediaUrl}" controls class="loaded-media"></video>
                    <h3>${data.title}</h3>
                    <p class="word-text">${data.text}</p>
                </div>
            `);

            // 4. Музыка
            loadSectionData("music", "music-container", (data) => `
                <div class="card media-card">
                    <audio src="${data.mediaUrls ? data.mediaUrls[0] : data.mediaUrl}" controls class="audio-player-custom"></audio>
                    <h3>${data.title}</h3>
                    <p class="word-text">${data.text}</p>
                </div>
            `);

            // 5. Библиотека
            loadSectionData("books", "books-container", (data) => `
                <div class="card">
                    <h3>${data.title}</h3>
                    <p class="word-text" style="margin-bottom: 15px;">${data.text}</p>
                    <a href="${data.mediaUrls ? data.mediaUrls[0] : data.mediaUrl}" target="_blank" class="btn">Скачать / Читать</a>
                </div>
            `);
        });
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #121214; color: #ffffff; font-family: 'Arial', sans-serif; line-height: 1.5; }

        header { background-color: #121214; padding: 40px 20px 20px 20px; text-align: center; }
        .logo h1 { font-family: 'Montserrat', sans-serif; font-size: 4.2rem; font-weight: 900; color: #EBEBEB; text-transform: uppercase; text-shadow: 4px 4px 0px #dd0000; }
        .description { font-size: 1.05rem; font-weight: bold; color: #a0a0a5; text-align: center; margin-bottom: 35px; }

        nav { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; max-width: 650px; margin: 0 auto 20px auto; }
        nav a { color: #ffffff; text-decoration: none; font-size: 0.95rem; text-transform: uppercase; padding: 15px 0; background-color: #1a1a1c; border: 1px solid #2d2d30; text-align: center; }
        nav a:hover { background-color: #dd0000; color: #000000; font-weight: bold; }
        .red-bar { width: 100%; height: 5px; background-color: #dd0000; }

        .main-content-wrapper { background-color: #0f0f11; position: relative; padding: 50px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .section-title { font-family: 'Montserrat', sans-serif; font-size: 2.2rem; text-transform: uppercase; border-left: 6px solid #dd0000; padding-left: 15px; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }

        /* КАРТОЧКА И ШРИФТ ИЗ ВОРДА */
        .card { background: rgba(26, 26, 28, 0.92); border: 1px solid #2d2d30; padding: 25px; display: flex; flex-direction: column; }
        .card h3 { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; text-transform: uppercase; margin-top: 15px; margin-bottom: 12px; color: #dd0000; }
        
        /* Текст как в Word: шрифт Times New Roman, выравнивание по ширине или левому краю */
        .card p.word-text { 
            font-family: 'Times New Roman', Times, Georgia, serif; 
            font-size: 1.15rem; 
            color: #e0e0e0; 
            white-space: pre-wrap; 
            line-height: 1.6;
        }

        /* ТТ КАРУСЕЛЬ (СЛАЙДЕР ФОТОГРАФИЙ НА САМОМ ВЕРХУ) */
        .carousel-container { position: relative; width: 100%; height: 300px; background-color: #121214; border: 1px solid #2d2d30; overflow: hidden; }
        .carousel-slides { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .carousel-slide { display: none; width: 100%; height: 100%; object-fit: contain; }
        .carousel-slide.active { display: block; }
        
        .carousel-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.7); color: #fff; border: none; padding: 10px 12px; cursor: pointer; z-index: 5; font-size: 16px; }
        .carousel-nav:hover { background: #dd0000; color: #000; }
        .carousel-nav.prev { left: 0; }
        .carousel-nav.next { right: 0; }
        
        .carousel-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 5; }
        .carousel-dot { width: 8px; height: 8px; background: rgba(255,255,255,0.4); border-radius: 50%; cursor: pointer; }
        .carousel-dot.active { background: #dd0000; width: 14px; border-radius: 4px; }

        .loaded-media { width: 100%; height: 300px; object-fit: contain; background-color: #121214; border: 1px solid #2d2d30; }
        .audio-player-custom { width: 100%; }
        .btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background-color: #dd0000; color: #000000; text-decoration: none; font-weight: bold; text-transform: uppercase; text-align: center; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><h1>ССБА</h1></div>
        <p class="description">Марксистское объединение. Образование и просвещение.</p>
        <nav>
            <a href="#posts">Посты</a>
            <a href="#photo">Фото</a>
            <a href="#video">Видео</a>
            <a href="#music">Музыка</a>
            <a href="#books">Книги</a>
        </nav>
    </header>
    <div class="red-bar"></div>

    <div class="main-content-wrapper">
        <div class="container">
            <section id="posts"><h2 class="section-title">Последние Посты</h2><div class="grid" id="posts-container"></div></section>
            <section id="photo"><h2 class="section-title">Фотогалерея</h2><div class="grid" id="photo-container"></div></section>
            <section id="video"><h2 class="section-title">Видеоархив</h2><div class="grid" id="video-container"></div></section>
            <section id="music"><h2 class="section-title">Музыкальный архив</h2><div class="grid" id="music-container"></div></section>
            <section id="books"><h2 class="section-title">Библиотека</h2><div class="grid" id="books-container"></div></section>
        </div>
    </div>
</body>
</html>
