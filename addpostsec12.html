<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ССБА — Панель Управления</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANXc2iamJlauk-xsFYiITOBYBh1sUCKqU",
            authDomain: "ssba-58900.firebaseapp.com",
            databaseURL: "https://ssba-58900-default-rtdb.firebaseio.com",
            projectId: "ssba-58900",
            storageBucket: "ssba-58900.firebasestorage.app",
            messagingSenderId: "615638249829",
            appId: "1:615638249829:web:a68cd961fa79ebc7ef718c",
            measurementId: "G-ZY8PQ2DXE3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let uploadedMediaUrls = []; 
        const cloudName = "dkxz31t7k"; 
        const uploadPreset = "ml_default"; 

        const fileInput = document.getElementById('hidden-file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatus = document.getElementById('upload-status');
        const imgCodesContainer = document.getElementById('img-codes-container');
        const previewContainer = document.getElementById('preview-container');
        const submitBtn = document.getElementById('submit-btn');

        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (event) => {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            uploadedMediaUrls = []; 
            imgCodesContainer.innerHTML = "";
            previewContainer.innerHTML = ""; // Очищаем старые превью
            uploadBtn.disabled = true;
            submitBtn.disabled = true;

            const currentSection = document.getElementById('section-select').value;
            let resourceType = "image";
            if (currentSection === "video" || currentSection === "music") resourceType = "video";
            if (currentSection === "books") resourceType = "raw";

            try {
                for (let i = 0; i < files.length; i++) {
                    uploadStatus.innerText = `Загрузка файла ${i + 1} из ${files.length}...`;
                    
                    const formData = new FormData();
                    formData.append('file', files[i]);
                    formData.append('upload_preset', uploadPreset);

                    const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/${resourceType}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error("Ошибка загрузки.");
                    const data = await response.json();
                    uploadedMediaUrls.push(data.secure_url);

                    // Отрисовываем превью сразу по мере загрузки (только для картинок)
                    if (currentSection === 'posts' || currentSection === 'photo') {
                        const imgNum = uploadedMediaUrls.length;
                        
                        // Создаем контейнер для миниатюры
                        const item = document.createElement('div');
                        item.className = 'preview-item';
                        item.innerHTML = `
                            <img src="${data.secure_url}" alt="Превью">
                            <div class="preview-badge">${imgNum}</div>
                        `;
                        previewContainer.appendChild(item);
                    }
                }

                uploadStatus.innerText = `Загружено файлов: ${uploadedMediaUrls.length}. Кликните на код, чтобы скопировать его в буфер обмена:`;
                uploadStatus.style.color = "#00ff00";

                // Генерируем текстовые коды для быстрой вставки
                if (currentSection === 'posts' || currentSection === 'photo') {
                    uploadedMediaUrls.forEach((url, index) => {
                        const code = `[img${index+1}]`;
                        imgCodesContainer.innerHTML += `<span class="img-code-badge" onclick="navigator.clipboard.writeText('${code}'); alert('Код ${code} скопирован!');">${code}</span>`;
                    });
                }

            } catch (error) {
                console.error(error);
                uploadStatus.innerText = "Ошибка фоновой загрузки.";
                uploadStatus.style.color = "#ff0000";
                uploadedMediaUrls = [];
                previewContainer.innerHTML = "";
            } finally {
                uploadBtn.disabled = false;
                submitBtn.disabled = false;
            }
        });

        document.getElementById('section-select').addEventListener('change', (e) => {
            uploadedMediaUrls = [];
            fileInput.value = "";
            uploadStatus.innerText = "Файлы не выбраны";
            uploadStatus.style.color = "#8a8a8f";
            imgCodesContainer.innerHTML = "";
            previewContainer.innerHTML = "";
            
            if (e.target.value === 'posts' || e.target.value === 'photo') {
                fileInput.setAttribute('multiple', 'true');
                fileInput.accept = "image/*";
                uploadBtn.innerText = "Выбрать изображения (Можно несколько)";
            } else {
                fileInput.removeAttribute('multiple');
                if (e.target.value === 'video') fileInput.accept = "video/*";
                else if (e.target.value === 'music') fileInput.accept = "audio/*";
                else if (e.target.value === 'books') fileInput.accept = ".pdf,.epub,.fb2,.txt";
                uploadBtn.innerText = "Выбрать медиафайл";
            }
        });

        document.getElementById('add-post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const section = document.getElementById('section-select').value;
            const title = document.getElementById('post-title').value.trim();
            const text = document.getElementById('post-text').value.trim();

            if (section !== 'posts' && !title) return alert("Заголовок обязателен!");
            if (!text) return alert("Введите text публикации!");

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = "ПУБЛИКАЦИЯ...";

                await addDoc(collection(db, section), {
                    title: title,
                    text: text,
                    mediaUrls: uploadedMediaUrls, 
                    createdAt: serverTimestamp() 
                });

                alert("Успешно опубликовано!");
                document.getElementById('add-post-form').reset();
                uploadedMediaUrls = [];
                fileInput.value = "";
                uploadStatus.innerText = "Файлы не выбраны";
                imgCodesContainer.innerHTML = "";
                previewContainer.innerHTML = "";

            } catch (error) {
                alert("Ошибка: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "ОПУБЛИКОВАТЬ";
            }
        });
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #121214; color: #ffffff; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .admin-box { background-color: #1a1a1c; border: 1px solid #2d2d30; width: 100%; max-width: 600px; padding: 40px 30px; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 2rem; text-transform: uppercase; color: #dd0000; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; color: #8a8a8f; margin-bottom: 8px; }
        select, input[type="text"], textarea { width: 100%; background-color: #121214; border: 1px solid #2d2d30; color: #ffffff; padding: 12px 15px; font-size: 1rem; }
        textarea { resize: vertical; min-height: 160px; font-family: 'Times New Roman', Times, serif; font-size: 1.1rem; }
        
        .upload-trigger-btn { display: inline-block; background-color: #252528; border: 1px dashed #444; color: #ffffff; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .status-text { margin-top: 8px; font-size: 0.85rem; color: #8a8a8f; font-style: italic; margin-bottom: 5px; }
        
        /* Стили для бейджиков с кодами */
        .img-codes-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .img-code-badge { background-color: #252528; color: #ffaa00; border: 1px solid #ffaa00; font-family: monospace; font-weight: bold; padding: 6px 10px; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
        .img-code-badge:hover { background-color: #ffaa00; color: #000; }
        
        /* СЕТКА ПРЕВЬЮ С ЦИФРАМИ */
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; margin-top: 10px; }
        .preview-item { position: relative; width: 80px; height: 80px; border: 1px solid #444; background-color: #121214; overflow: hidden; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Индикатор-цифра поверх фото */
        .preview-badge { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.4); /* Затемнение фона, чтобы цифру было видно на любой фотке */
            color: #ffffff; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.6rem; 
            font-weight: 900; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-shadow: 2px 2px 4px #000000, -2px -2px 4px #000000;
            pointer-events: none; /* Чтобы не мешало кликам, если они понадобятся */
        }

        .submit-btn { width: 100%; background-color: #dd0000; color: #000000; border: none; padding: 16px; font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .submit-btn:disabled { background-color: #5a0000; color: #8a8a8f; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h1>Панель публикации ССБА</h1>
        <form id="add-post-form">
            <div class="form-group">
                <label for="section-select">Выберите раздел сайта</label>
                <select id="section-select">
                    <option value="posts">Посты (Текст)</option>
                    <option value="photo">Фотогалерея (Фото + Текст)</option>
                    <option value="video">Видеоархив</option>
                    <option value="music">Музыка</option>
                    <option value="books">Библиотека</option>
                </select>
            </div>
            <div class="form-group">
                <label for="post-title">Заголовок</label>
                <input type="text" id="post-title" placeholder="Введите заголовок...">
            </div>
            <div class="form-group">
                <label>Загрузить медиафайлы</label>
                <input type="file" id="hidden-file-input" accept="image/*" multiple style="display: none;">
                <button type="button" class="upload-trigger-btn" id="upload-btn">Выбрать изображения (Можно несколько)</button>
                <div class="status-text" id="upload-status">Файлы не выбраны</div>
                
                <!-- Список кодов для клика и копирования -->
                <div class="img-codes-list" id="img-codes-container"></div>
                
                <!-- Визуальные картинки с цифрами сверху -->
                <div class="preview-grid" id="preview-container"></div>
            </div>
            <div class="form-group">
                <label for="post-text">Текст (Используйте [img1], [img2] внутри текста для расстановки фото)</label>
                <textarea id="post-text" placeholder="Пример: Текст до фото...&#10;[img1]&#10;Текст после фото..."></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">ОПУБЛИКОВАТЬ</button>
        </form>
    </div>
</body>
</html>
