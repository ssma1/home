<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ССБА — Панель Управления</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    
    <!-- Подключаем Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANXc2iamJlauk-xsFYiITOBYBh1sUCKqU",
            authDomain: "ssba-58900.firebaseapp.com",
            databaseURL: "https://ssba-58900-default-rtdb.firebaseio.com",
            projectId: "ssba-58900",
            storageBucket: "ssba-58900.firebasestorage.app",
            messagingSenderId: "615638249829",
            appId: "1:615638249829:web:a68cd961fa79ebc7ef718c",
            measurementId: "G-ZY8PQ2DXE3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let uploadedMediaUrls = []; // Массив для ссылок на файлы
        const cloudName = "dkxz31t7k"; 
        const uploadPreset = "ml_default"; 

        const fileInput = document.getElementById('hidden-file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatus = document.getElementById('upload-status');
        const submitBtn = document.getElementById('submit-btn');
        const mediaLabel = document.getElementById('media-label');

        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // Фоновая загрузка нескольких файлов в Cloudinary
        fileInput.addEventListener('change', async (event) => {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            uploadedMediaUrls = []; // Очищаем старые ссылки
            uploadBtn.disabled = true;
            submitBtn.disabled = true;

            const currentSection = document.getElementById('section-select').value;
            let resourceType = "image";
            if (currentSection === "video" || currentSection === "music") resourceType = "video";
            if (currentSection === "books") resourceType = "raw";

            try {
                for (let i = 0; i < files.length; i++) {
                    uploadStatus.innerText = `Загрузка файла ${i + 1} из ${files.length}...`;
                    uploadStatus.style.color = "#ffaa00";

                    const formData = new FormData();
                    formData.append('file', files[i]);
                    formData.append('upload_preset', uploadPreset);

                    const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/${resourceType}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error("Ошибка при передаче одного из файлов.");

                    const data = await response.json();
                    uploadedMediaUrls.push(data.secure_url);
                }

                uploadStatus.innerText = `Успешно загружено файлов: ${uploadedMediaUrls.length}!`;
                uploadStatus.style.color = "#00ff00";

            } catch (error) {
                console.error(error);
                alert("Ошибка при фоновой загрузке: " + error.message);
                uploadStatus.innerText = "Ошибка загрузки файлов";
                uploadStatus.style.color = "#ff0000";
                uploadedMediaUrls = [];
            } finally {
                uploadBtn.disabled = false;
                submitBtn.disabled = false;
            }
        });

        // Умное переключение интерфейса под разделы
        document.getElementById('section-select').addEventListener('change', (e) => {
            const titleInput = document.getElementById('post-title');
            uploadedMediaUrls = [];
            fileInput.value = "";
            uploadStatus.innerText = "Файлы не выбраны";
            uploadStatus.style.color = "#8a8a8f";
            
            if (e.target.value === 'posts') {
                fileInput.removeAttribute('multiple');
                fileInput.setAttribute('multiple', 'true'); // Можно несколько фоток
                fileInput.accept = "image/*";
                uploadBtn.innerText = "Выбрать фото для поста (Можно несколько)";
                mediaLabel.innerText = "Прикрепить фото к посту (необязательно)";
                titleInput.placeholder = "Заголовок поста (необязательно)";
            } else if (e.target.value === 'photo') {
                fileInput.removeAttribute('multiple');
                fileInput.setAttribute('multiple', 'true'); // Можно несколько фоток
                fileInput.accept = "image/*";
                uploadBtn.innerText = "Выбрать Фото в галерею (Можно несколько)";
                mediaLabel.innerText = "Медиафайлы (обязательно)";
                titleInput.placeholder = "Введите заголовок медиа (обязательно)";
            } else {
                fileInput.removeAttribute('multiple'); // Видео, Музыка, Книги — только по одному файлу
                if (e.target.value === 'video') {
                    fileInput.accept = "video/*";
                    uploadBtn.innerText = "Выбрать Видео";
                } else if (e.target.value === 'music') {
                    fileInput.accept = "audio/*";
                    uploadBtn.innerText = "Выбрать Аудио";
                } else if (e.target.value === 'books') {
                    fileInput.accept = ".pdf,.epub,.fb2,.txt";
                    uploadBtn.innerText = "Выбрать Книгу";
                }
                mediaLabel.innerText = "Медиафайл (обязательно)";
                titleInput.placeholder = "Введите заголовок (обязательно)";
            }
        });

        // Отправка формы в Firestore
        document.getElementById('add-post-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const section = document.getElementById('section-select').value;
            const title = document.getElementById('post-title').value.trim();
            const text = document.getElementById('post-text').value.trim();

            if (section !== 'posts' && !title) {
                alert("Заголовок обязателен для этого раздела!");
                return;
            }
            if (!text) {
                alert("Пожалуйста, введите текст описания!");
                return;
            }
            if (section !== 'posts' && uploadedMediaUrls.length === 0) {
                alert("Вы не выбрали файлы или они ещё загружаются!");
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.innerText = "ПУБЛИКАЦИЯ...";

                await addDoc(collection(db, section), {
                    title: title,
                    text: text,
                    mediaUrls: uploadedMediaUrls, // Сохраняем массив ссылок
                    createdAt: serverTimestamp() 
                });

                alert("Успешно опубликовано!");
                document.getElementById('add-post-form').reset();
                uploadedMediaUrls = [];
                fileInput.value = "";
                uploadStatus.innerText = "Файлы не выбраны";
                uploadStatus.style.color = "#8a8a8f";

            } catch (error) {
                console.error("Ошибка Firestore: ", error);
                alert("Ошибка при сохранении: " + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "ОПУБЛИКОВАТЬ";
            }
        });
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #121214; color: #ffffff; font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
        }
        .admin-box { background-color: #1a1a1c; border: 1px solid #2d2d30; width: 100%; max-width: 600px; padding: 40px 30px; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 2rem; text-transform: uppercase; color: #dd0000; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; color: #8a8a8f; margin-bottom: 8px; }
        select, input[type="text"], textarea { width: 100%; background-color: #121214; border: 1px solid #2d2d30; color: #ffffff; padding: 12px 15px; font-size: 1rem; }
        textarea { resize: vertical; min-height: 140px; font-family: 'Times New Roman', Times, serif; font-size: 1.1rem; } /* Шрифт ворда в поле ввода */
        .upload-trigger-btn { display: inline-block; background-color: #252528; border: 1px dashed #444; color: #ffffff; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .upload-trigger-btn:hover { border-color: #dd0000; }
        .status-text { margin-top: 8px; font-size: 0.85rem; color: #8a8a8f; font-style: italic; }
        .submit-btn { width: 100%; background-color: #dd0000; color: #000000; border: none; padding: 16px; font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .submit-btn:disabled { background-color: #5a0000; color: #8a8a8f; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h1>Панель публикации ССБА</h1>
        <form id="add-post-form">
            <div class="form-group">
                <label for="section-select">Выберите раздел сайта</label>
                <select id="section-select">
                    <option value="posts">Посты (Текст)</option>
                    <option value="photo">Фотогалерея (Фото + Текст)</option>
                    <option value="video">Видеоархив (Видео + Текст)</option>
                    <option value="music">Музыка (Аудио + Текст)</option>
                    <option value="books">Библиотека (Книги + Описание)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="post-title">Заголовок</label>
                <input type="text" id="post-title" placeholder="Заголовок поста (необязательно)">
            </div>
            <div class="form-group">
                <label id="media-label">Прикрепить фото к посту (Можно несколько)</label>
                <input type="file" id="hidden-file-input" accept="image/*" multiple style="display: none;">
                <button type="button" class="upload-trigger-btn" id="upload-btn">Выбрать фото для поста (Можно несколько)</button>
                <div class="status-text" id="upload-status">Файлы не выбраны</div>
            </div>
            <div class="form-group">
                <label for="post-text">Текст публикации / Описание (Шрифт как в Word)</label>
                <textarea id="post-text" placeholder="Введите основной текст..."></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">ОПУБЛИКОВАТЬ</button>
        </form>
    </div>
</body>
</html>
