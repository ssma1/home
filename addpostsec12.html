<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ССБА — Панель Управления</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANXc2iamJlauk-xsFYiITOBYBh1sUCKqU",
            authDomain: "ssba-58900.firebaseapp.com",
            databaseURL: "https://ssba-58900-default-rtdb.firebaseio.com",
            projectId: "ssba-58900",
            storageBucket: "ssba-58900.firebasestorage.app",
            messagingSenderId: "615638249829",
            appId: "1:615638249829:web:a68cd961fa79ebc7ef718c",
            measurementId: "G-ZY8PQ2DXE3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let uploadedMediaUrls = []; 
        const cloudName = "dkxz31t7k"; 
        const uploadPreset = "ml_default"; 

        // Инструмент быстрого форматирования тегов в текстовом поле
        window.insertHtmlTag = function(openTag, closeTag) {
            const textarea = document.getElementById('post-text');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const selectedText = text.substring(start, end);
            
            const replacement = openTag + (selectedText || "текст") + closeTag;
            textarea.value = text.substring(0, start) + replacement + text.substring(end);
            textarea.focus();
            textarea.setSelectionRange(start + replacement.length, start + replacement.length);
        };

        const fileInput = document.getElementById('hidden-file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatus = document.getElementById('upload-status');
        const imgCodesContainer = document.getElementById('img-codes-container');
        const previewContainer = document.getElementById('preview-container');
        const submitBtn = document.getElementById('submit-btn');

        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (event) => {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            uploadedMediaUrls = []; 
            imgCodesContainer.innerHTML = "";
            previewContainer.innerHTML = ""; 
            uploadBtn.disabled = true;
            submitBtn.disabled = true;

            const currentSection = document.getElementById('section-select').value;
            let resourceType = "image";
            if (currentSection === "video" || currentSection === "music") resourceType = "video";
            if (currentSection === "books") resourceType = "raw";

            try {
                for (let i = 0; i < files.length; i++) {
                    uploadStatus.innerText = `Загрузка файла ${i + 1} из ${files.length}...`;
                    const formData = new FormData();
                    formData.append('file', files[i]);
                    formData.append('upload_preset', uploadPreset);

                    const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/${resourceType}/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error("Ошибка загрузки");
                    const data = await response.json();
                    uploadedMediaUrls.push(data.secure_url);

                    if (currentSection === 'posts' || currentSection === 'photo') {
                        const imgNum = uploadedMediaUrls.length;
                        const item = document.createElement('div');
                        item.className = 'preview-item';
                        item.innerHTML = `<img src="${data.secure_url}" alt="Превью"><div class="preview-badge">${imgNum}</div>`;
                        previewContainer.appendChild(item);
                    }
                }

                uploadStatus.innerText = `Файлов загружено: ${uploadedMediaUrls.length}. Кликни по тегу, чтобы скопировать его:`;
                uploadStatus.style.color = "#00ff00";

                if (currentSection === 'posts' || currentSection === 'photo') {
                    uploadedMediaUrls.forEach((url, index) => {
                        const code = `[img${index+1}]`;
                        imgCodesContainer.innerHTML += `<span class="img-code-badge" onclick="navigator.clipboard.writeText('${code}'); alert('Тег картинки скопирован!');">${code}</span>`;
                    });
                }
            } catch (error) {
                console.error(error);
                uploadStatus.innerText = "Ошибка фонового импорта файлов.";
                uploadStatus.style.color = "#ff0000";
            } finally {
                uploadBtn.disabled = false;
                submitBtn.disabled = false;
            }
        });

        document.getElementById('section-select').addEventListener('change', (e) => {
            uploadedMediaUrls = [];
            fileInput.value = "";
            uploadStatus.innerText = "Файлы не выбраны";
            imgCodesContainer.innerHTML = "";
            previewContainer.innerHTML = "";
            if (e.target.value === 'posts' || e.target.value === 'photo') {
                fileInput.setAttribute('multiple', 'true');
                fileInput.accept = "image/*";
                uploadBtn.innerText = "Выбрать изображения (Можно несколько)";
            } else {
                fileInput.removeAttribute('multiple');
                if (e.target.value === 'video') fileInput.accept = "video/*";
                else if (e.target.value === 'music') fileInput.accept = "audio/*";
                else if (e.target.value === 'books') fileInput.accept = ".pdf,.epub,.fb2,.txt";
                uploadBtn.innerText = "Выбрать файл";
            }
        });

        document.getElementById('add-post-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const section = document.getElementById('section-select').value;
            const title = document.getElementById('post-title').value.trim();
            const text = document.getElementById('post-text').value.trim();

            if (section !== 'posts' && !title) return alert("Заголовок обязателен!");
            if (!text) return alert("Введите текст публикации!");

            try {
                submitBtn.disabled = true;
                await addDoc(collection(db, section), {
                    title: title,
                    text: text,
                    mediaUrls: uploadedMediaUrls,
                    views: 0, // Каждому посту по умолчанию ставим 0 просмотров
                    createdAt: serverTimestamp()
                });
                alert("Успешно опубликовано на сайт!");
                document.getElementById('add-post-form').reset();
                previewContainer.innerHTML = "";
                imgCodesContainer.innerHTML = "";
                uploadStatus.innerText = "Файлы не выбраны";
            } catch (error) {
                alert("Ошибка сохранения: " + error.message);
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #121214; color: #ffffff; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .admin-box { background-color: #1a1a1c; border: 1px solid #2d2d30; width: 100%; max-width: 650px; padding: 40px 30px; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 2rem; text-transform: uppercase; color: #dd0000; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; color: #8a8a8f; margin-bottom: 8px; }
        select, input[type="text"], textarea { width: 100%; background-color: #121214; border: 1px solid #2d2d30; color: #ffffff; padding: 12px 15px; font-size: 1rem; }
        textarea { resize: vertical; min-height: 180px; font-family: 'Times New Roman', Times, serif; font-size: 1.1rem; }
        
        .font-toolbar { display: flex; flex-wrap: wrap; gap: 6px; background-color: #121214; border: 1px solid #2d2d30; border-bottom: none; padding: 8px; }
        .font-btn { background-color: #252528; border: 1px solid #444; color: #fff; padding: 6px 10px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .font-btn:hover { background-color: #dd0000; color: #000; border-color: #dd0000; }

        .upload-trigger-btn { display: inline-block; background-color: #252528; border: 1px dashed #444; color: #ffffff; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; }
        .status-text { margin-top: 8px; font-size: 0.85rem; color: #8a8a8f; font-style: italic; }
        .img-codes-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .img-code-badge { background-color: #252528; color: #ffaa00; border: 1px solid #ffaa00; font-family: monospace; padding: 5px 8px; cursor: pointer; }

        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 10px; margin-top: 10px; }
        .preview-item { position: relative; width: 70px; height: 70px; border: 1px solid #444; overflow: hidden; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .preview-badge { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); color: #fff; font-family: 'Montserrat', sans-serif; font-size: 1.4rem; font-weight: 900; display: flex; justify-content: center; align-items: center; }

        .submit-btn { width: 100%; background-color: #dd0000; color: #000000; border: none; padding: 16px; font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="admin-box">
        <h1>Панель управления ССБА</h1>
        <form id="add-post-form">
            <div class="form-group">
                <label>Раздел публикации</label>
                <select id="section-select">
                    <option value="posts">Посты (Текст)</option>
                    <option value="photo">Фотогалерея (Фото + Текст)</option>
                    <option value="video">Видеоархив</option>
                    <option value="music">Музыкальный архив</option>
                    <option value="books">Библиотека</option>
                </select>
            </div>
            <div class="form-group">
                <label>Заголовок</label>
                <input type="text" id="post-title" placeholder="Введите заголовок...">
            </div>
            <div class="form-group">
                <label>Загрузка медиа</label>
                <input type="file" id="hidden-file-input" multiple style="display: none;">
                <button type="button" class="upload-trigger-btn" id="upload-btn">Выбрать изображения (Можно несколько)</button>
                <div class="status-text" id="upload-status">Файлы не выбраны</div>
                <div class="img-codes-list" id="img-codes-container"></div>
                <div class="preview-grid" id="preview-container"></div>
            </div>
            <div class="form-group">
                <label>Текст (Поддерживает HTML стилизацию)</label>
                <div class="font-toolbar">
                    <button type="button" class="font-btn" onclick="insertHtmlTag('<b>','</b>')">Жирный</button>
                    <button type="button" class="font-btn" onclick="insertHtmlTag('<i>','</i>')">Курсив</button>
                    <button type="button" class="font-btn" onclick="insertHtmlTag('<u>','</u>')">Подчеркнутый</button>
                    <button type="button" class="font-btn" onclick="insertHtmlTag('<span style=\'font-family:monospace;\'>','</span>')">Моноширинный</button>
                    <button type="button" class="font-btn" onclick="insertHtmlTag('<span style=\'font-size:1.4rem;\'>','</span>')">Крупный текст</button>
                </div>
                <textarea id="post-text" placeholder="Пишите текст. Для форматирования выделите слово мышкой и нажмите кнопку панели сверху..."></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">ОПУБЛИКОВАТЬ</button>
        </form>
    </div>
</body>
</html>
